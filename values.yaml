replicaCount: 1

agent:
  hostname: "ccf-agent-test"
  daemon: true
  verbosity: 1
  api:
    url: "http://ccf-api:8080"
  plugins:
    k8s:
      schedule: "*/5 * * * *"
      source: /plugins/plugin-k8s/plugin
      policies:
        - /plugins/plugin-k8s-opres-policies/bundle.tar.gz
      config: {}

# Mount the plugins emptyDir into the agent container (populated by the init container below)
volumeMounts:
  - name: plugins
    mountPath: /plugins
    readOnly: true

volumes:
  - name: plugins
    emptyDir: {}

serviceAccount:
  create: true

initContainers:
  - name: plugin-sidecar
    image: ghcr.io/compliance-framework/local-plugins:0.1.0
    imagePullPolicy: IfNotPresent
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop:
          - ALL
    command:
      - sh
      - -c
      - cp -rv /plugins/* /output/
    volumeMounts:
      - name: plugins
        mountPath: /output
